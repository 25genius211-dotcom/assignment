<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리시골</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">

    <!-- Leaflet 지도 -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>

    <div class="logo">
        🌿 우리시골
    </div>

    <nav>
        <a href="#">홈</a>
        <a href="#">지도</a>
        <a href="#">관광</a>
        <a href="#">커뮤니티</a>
        <a href="#">마이페이지</a>
    </nav>

</header>

<section class="hero">

    <div class="overlay">

        <h1>
            자연과 기회가 있는 곳
        </h1>

        <p>
            우리 시골을 여행하고,
            살아보고,
            일해보세요.
        </p>

        <div class="search-box">

            <input
            type="text"
            id="searchInput"
            placeholder="지역 또는 관광지를 검색하세요">

            <button id="searchBtn">
                검색
            </button>

        </div>

    </div>

</section>

<section class="category">

    <h2>무엇을 찾고 계신가요?</h2>

    <div class="grid">

        <button class="card">🍜 맛집</button>

        <button class="card">🌳 관광</button>

        <button class="card">💼 일자리</button>

        <button class="card">🏫 학교</button>

        <button class="card">🏠 주거</button>

        <button class="card">🎉 축제</button>

    </div>

</section>

<section class="map-section">

    <h2>우리시골 지도</h2>

    <div id="map"><div class="legend">

<div><span class="red"></span>맛집</div>

<div><span class="green"></span>관광</div>

<div><span class="blue"></span>학교</div>

<div><span class="orange"></span>주거</div>

<div><span class="purple"></span>일자리</div>

</div>
<section class="region-select">

    <h2>지역 선택</h2>

    <div class="select-box">

        <select id="province">

            <option>시·도를 선택하세요</option>

        </select>

        <select id="city">

            <option>시·군·구를 선택하세요</option>

        </select>

        <select id="category">

            <option value="">전체</option>
            <option value="관광">관광</option>
            <option value="맛집">맛집</option>
            <option value="학교">학교</option>
            <option value="주거">주거</option>
            <option value="일자리">일자리</option>

        </select>

    </div>

</section>

<section id="resultList"></section>
</div>

</section>

<section class="recommend">

<h2>추천 지역</h2>

<div class="cards">

<div class="place-card">

<img src="images/andong.jpg">

<h3>안동</h3>

<p>하회마을과 전통문화의 도시</p>

</div>

<div class="place-card">

<img src="images/damyang.jpg">

<h3>담양</h3>

<p>죽녹원과 메타세쿼이아길</p>

</div>

<div class="place-card">

<img src="images/pyeongchang.jpg">

<h3>평창</h3>

<p>대관령과 자연 힐링</p>

</div>

</div>

</section>

<footer>

<p>

© 2026 우리시골

</p>

</footer>

<script src="js/app.js"></script>
<script src="js/map.js"></script>

</body>
</html>
